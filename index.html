<body>
<h1>Groupe Scolaire Taghilast, Unité Hadria  </h1>
<h2>Jeu & Défi de calcule mantal </h2>
<div id="scoreBoard">Score: 0 | Best: 0 | Level: 1</div>
<div id="gameArea">
  <div id="operationCard"></div>
  <div id="answers"></div>
  <div id="finalScreen">
    <div id="finalText"></div>
    <button onclick="restartGame()">Rejouer une autre fois</button>
  </div>
</div>

<script>
let score = 0;
let bestScore = localStorage.getItem("bestScore") || 0;
let level = 1;
let speed = 0.2;
let currentAnswer = 0;
let fallingInterval;

function updateBoard() {
  document.getElementById("scoreBoard").innerText =
    "Score: " + score + " | Meilleur score: " + bestScore + " | Niveau: " + level;
}

function getRandomNumber() {
  let digits = Math.min(1 + Math.floor(level/3), 4);
  let min = Math.pow(10, digits-1);
  let max = Math.pow(10, digits) - 1;
  if(digits === 1) return Math.floor(Math.random()*10);
  return Math.floor(Math.random()*(max-min+1))+min;
}

function generateOperation() {
  let a = getRandomNumber();
  let b = getRandomNumber();
  let ops = ['+', '-', '*'];
  let op = ops[Math.floor(Math.random()*ops.length)];

  if(op === '+') currentAnswer = a + b;
 if(op === '-') {
  if (a < b) {
    let temp = a;
    a = b;
    b = temp;
  }
  currentAnswer = a - b;
}

  if(op === '*') currentAnswer = a * b;
  
  let displayOp = op === '*' ? 'x' : op;
  document.getElementById("operationCard").innerText = `${a} ${displayOp} ${b}`;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  let options = [currentAnswer];
  while(options.length < 3) {
let wrong;
do {
  wrong = currentAnswer + Math.floor(Math.random()*20 - 10);
} while (wrong < 0 || options.includes(wrong));
    if(!options.includes(wrong)) options.push(wrong);
  }

  options.sort(() => Math.random()-0.5);

  options.forEach(num => {
    let div = document.createElement("div");
    div.className = "answerCard";
    div.innerText = num;
    div.onclick = () => checkAnswer(num);
    answersDiv.appendChild(div);
  });

  fallCard();
}

function fallCard() {
  let card = document.getElementById("operationCard");
  let pos = 0;
  clearInterval(fallingInterval);
  fallingInterval = setInterval(() => {
    pos += speed;
    card.style.top = pos + "px";
    if(pos > window.innerHeight * 0.6) {
      endGame();
    }
  }, 20);
}

function checkAnswer(selected) {
  if(selected === currentAnswer) {
    score++;
    if(score > bestScore) {
      bestScore = score;
      localStorage.setItem("bestScore", bestScore);
    }
    level = 1 + Math.floor(score/5);
    speed += 0.04;
    generateOperation();
  } else {
    endGame();
  }
  updateBoard();
}

function endGame() {
  clearInterval(fallingInterval);
  document.getElementById("finalText").innerText =
    "Fin!\nScore final: " + score + "\nMeilleur score: " + bestScore;
  document.getElementById("finalScreen").style.display = "flex";
}

function restartGame() {
  score = 0;
  level = 1;
  speed = 0.5;
  document.getElementById("finalScreen").style.display = "none";
  updateBoard();
  generateOperation();
}

updateBoard();
generateOperation();
</script>
